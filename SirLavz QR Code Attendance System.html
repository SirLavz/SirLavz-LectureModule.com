 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SirLavz QR Attendance - iOS 26 Filipino Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-glass: rgba(255, 255, 255, 0.45);
            --ios-blue: #007aff;
            --ios-red: #ff3b30;
            --ios-green: #34c759;
            --blur: blur(35px);
            --shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            background: linear-gradient(135deg, #dae5ff 0%, #f9eaff 50%, #e8f9ff 100%);
            background-attachment: fixed;
            margin: 0; padding: 20px; color: #1d1d1f; min-height: 100vh;
        }

        h1, h2 { text-align: center; color: #000; text-transform: uppercase; margin: 5px 0; }
        h1 { font-weight: 800; font-size: 28px; letter-spacing: -0.5px; }
        h2 { font-weight: 400; font-size: 14px; opacity: 0.6; }

        .nav-container { 
            text-align: center; margin: 0 auto 30px auto; padding: 10px; max-width: 600px;
            background: var(--ios-glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.5);
            box-shadow: var(--shadow); position: sticky; top: 15px; z-index: 1000;
        }

        button { 
            padding: 12px 18px; margin: 4px; cursor: pointer; border-radius: 14px; border: none; 
            background: var(--ios-blue); color: white; font-weight: 600; 
            transition: all 0.3s cubic-bezier(0.15, 0, 0.2, 1); 
        }

        .manage-box { 
            background: var(--ios-glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            padding: 25px; border-radius: 30px; margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.6); box-shadow: var(--shadow);
            max-width: 900px; margin-left: auto; margin-right: auto;
        }

        input, select { 
            padding: 14px; border-radius: 14px; border: 1px solid rgba(0,0,0,0.05); 
            margin: 5px; font-size: 15px; background: rgba(255,255,255,0.6); outline: none;
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; margin-top: 15px; max-width: 900px; margin-left: auto; margin-right: auto; }
        th { padding: 15px; color: var(--ios-blue); font-size: 12px; text-transform: uppercase; }
        td { background: rgba(255,255,255,0.7); padding: 16px; text-align: center; border: none; }
        tr td:first-child { border-radius: 20px 0 0 20px; }
        tr td:last-child { border-radius: 0 20px 20px 0; }

        .mgmt-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .mgmt-col { background: rgba(255,255,255,0.3); padding: 15px; border-radius: 22px; min-width: 200px; border: 1px solid rgba(255,255,255,0.3); }
        .pill { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #fff; border-radius: 12px; margin-bottom: 8px; font-size: 13px; font-weight: 600; }
        .del-circle { width: 20px; height: 20px; background: var(--ios-red); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        #scanner { width: 100%; max-width: 450px; margin: 20px auto; border: 8px solid white; border-radius: 40px; overflow: hidden; box-shadow: var(--shadow); }
        .tab { display: none; }
        .active-tab { display: block; animation: iosSlide 0.5s ease-out; }
        @keyframes iosSlide { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="hidden-qr-gen" style="display:none;"></div>

<h2>Laguna University - CCS</h2>
<h1>Attendance Tracker</h1>

<div class="nav-container">
    <button onclick="showTab('scanTab')">📸 Scanner</button>
    <button onclick="showTab('studentTab')">👥 Students</button>
    <button onclick="showTab('attendanceTab')">📋 Reports</button>
    <button onclick="showTab('settingsTab')" style="background:#636e72">⚙ Tools</button>
</div>

<div id="scanTab" class="tab active-tab">
    <div class="manage-box" style="text-align:center;">
        <div id="liveDateDisplay" style="font-weight:800; color:var(--ios-blue); font-size: 1.4em; margin-bottom:10px;"></div>
        <select id="scanSectionFilter" onchange="renderAll()"></select>
        <select id="cameraSource" style="width:180px;"></select>
        <br><br>
        <button onclick="startScanner()" style="background:var(--ios-green); width: 180px;">▶ OPEN CAMERA</button>
        <button onclick="stopScanner()" style="background:var(--ios-red);">⏹ STOP</button>
    </div>
    <div id="scanner"></div>
    <div id="scanStatus" style="text-align:center; font-weight:800; margin: 20px; font-size: 1.2em; color: var(--ios-blue);">READY TO SCAN</div>
    <table>
        <thead><tr><th>#</th><th>Student Name</th><th>In</th><th>Out</th><th>Action</th></tr></thead>
        <tbody id="scanMonitorBody"></tbody>
    </table>
</div>

<div id="studentTab" class="tab">
    <div class="manage-box">
        <div class="mgmt-grid">
            <div class="mgmt-col">
                <center><b>COURSES</b></center>
                <div style="display:flex; margin-top:10px;"><input id="newCourse" placeholder="BSCS" style="width:100%;"><button onclick="addItem('courses', 'newCourse')">+</button></div>
                <div id="list-courses" style="margin-top:10px;"></div>
            </div>
            <div class="mgmt-col">
                <center><b>YEARS</b></center>
                <div style="display:flex; margin-top:10px;"><input id="newYear" placeholder="2nd" style="width:100%;"><button onclick="addItem('years', 'newYear')">+</button></div>
                <div id="list-years" style="margin-top:10px;"></div>
            </div>
            <div class="mgmt-col">
                <center><b>SECTIONS</b></center>
                <div style="display:flex; margin-top:10px;"><input id="newSection" placeholder="2A" style="width:100%;"><button onclick="addItem('sections', 'newSection')">+</button></div>
                <div id="list-sections" style="margin-top:10px;"></div>
            </div>
        </div>
    </div>
    <div class="manage-box">
        <center>
            <h3>Enroll Student</h3>
            <input id="sid" placeholder="ID Number">
            <input id="sname" placeholder="Full Name">
            <select id="courseSelect"></select>
            <select id="yearSelect"></select>
            <select id="sectionSelect"></select>
            <button onclick="saveStudent()" style="background:var(--ios-green); width: 100%; margin-top:15px;">REGISTER</button>
            <hr style="margin:20px; opacity:0.1;">
            <select id="qrPrintSection"></select>
            <button onclick="printQRBatch()" style="background:var(--ios-blue);">Print Batch QR</button>
        </center>
    </div>
    <tbody id="studentTableBody"></tbody>
</div>

<div id="attendanceTab" class="tab">
    <div class="manage-box" style="text-align:center;">
        <input type="date" id="attDate" onchange="renderAll()">
        <select id="repSectionFilter" onchange="renderAll()"></select>
        <button onclick="printOfficialPDF()" style="background:#000;">🖨 PRINT REPORT</button>
    </div>
    <tbody id="attendanceReportBody"></tbody>
</div>

<div id="settingsTab" class="tab">
    <div class="manage-box" style="text-align:center;">
        <button onclick="backupData()" style="width:100%; background:var(--ios-blue);">💾 BACKUP DATA</button>
        <button onclick="factoryReset()" style="margin-top:30px; background:none; color:var(--ios-red); font-weight:800;">🚨 WIPE SYSTEM</button>
    </div>
</div>

<script>
let students = JSON.parse(localStorage.getItem('lu_ios26_st')) || [];
let attendance = JSON.parse(localStorage.getItem('lu_ios26_at')) || [];
let dropdowns = JSON.parse(localStorage.getItem('lu_ios26_dr')) || { sections:["2A"], courses:["BSCS"], years:["2nd"] };

function save(){ 
    localStorage.setItem('lu_ios26_st', JSON.stringify(students));
    localStorage.setItem('lu_ios26_at', JSON.stringify(attendance));
    localStorage.setItem('lu_ios26_dr', JSON.stringify(dropdowns));
}

const todayStr = new Date().toISOString().split('T')[0];
document.getElementById('attDate').value = todayStr;
document.getElementById('liveDateDisplay').innerText = new Date().toLocaleDateString('en-PH', { weekday: 'long', month: 'long', day: 'numeric' });

/* FILIPINO VOICE LOGIC */
function speak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'fil-PH';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }
}

function addItem(cat, id) {
    const v = document.getElementById(id).value.trim().toUpperCase();
    if(!v || dropdowns[cat].includes(v)) return;
    dropdowns[cat].push(v); dropdowns[cat].sort();
    save(); document.getElementById(id).value=""; refreshDropdowns();
}

function removeItem(cat, v) {
    if(confirm(`Remove ${v}?`)) { dropdowns[cat] = dropdowns[cat].filter(x => x !== v); save(); refreshDropdowns(); }
}

function refreshDropdowns() {
    const opts = arr => arr.map(x => `<option value="${x}">${x}</option>`).join("");
    const pills = (cat, arr) => arr.map(x => `<div class="pill">${x}<span class="del-circle" onclick="removeItem('${cat}','${x}')">×</span></div>`).join("");
    document.getElementById("sectionSelect").innerHTML = opts(dropdowns.sections);
    document.getElementById("courseSelect").innerHTML = opts(dropdowns.courses);
    document.getElementById("yearSelect").innerHTML = opts(dropdowns.years);
    document.getElementById("qrPrintSection").innerHTML = opts(dropdowns.sections);
    const filter = `<option value="ALL">ALL SECTIONS</option>` + opts(dropdowns.sections);
    document.getElementById("scanSectionFilter").innerHTML = filter;
    document.getElementById("repSectionFilter").innerHTML = filter;
    document.getElementById("list-courses").innerHTML = pills('courses', dropdowns.courses);
    document.getElementById("list-years").innerHTML = pills('years', dropdowns.years);
    document.getElementById("list-sections").innerHTML = pills('sections', dropdowns.sections);
    renderAll();
}

let html5QrCode;
let isLocked = false; 

async function startScanner() {
    const camId = document.getElementById('cameraSource').value;
    if(!html5QrCode) html5QrCode = new Html5Qrcode("scanner");
    html5QrCode.start(camId, { fps: 10, qrbox: 250 }, (id) => {
        if(isLocked) return;
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        let s = students.find(x => x.id === id);
        if(!s) return;
        
        let r = attendance.find(a => a.id === id && a.date === todayStr);
        if(!r) {
            attendance.push({ id, date: todayStr, timeIn: time, timeOut: null });
            document.getElementById("scanStatus").innerText = "WELCOME: " + s.name;
            speak(`Welcome to Laguna University, ${s.name}`);
        } else if(!r.timeOut) {
            r.timeOut = time;
            document.getElementById("scanStatus").innerText = "THANK YOU: " + s.name;
            speak(`Thank you, ${s.name}`);
        }
        
        isLocked = true;
        setTimeout(() => { isLocked = false; document.getElementById("scanStatus").innerText = "READY TO SCAN"; }, 3500);
        save(); renderAll();
    });
}

function stopScanner() { if(html5QrCode) html5QrCode.stop(); }

function renderAll() {
    const sF = document.getElementById("scanSectionFilter").value;
    document.getElementById("scanMonitorBody").innerHTML = students
        .filter(s => sF === "ALL" || s.section === sF)
        .map((s, i) => {
            const r = attendance.find(a => a.id === s.id && a.date === todayStr);
            return `<tr><td>${i+1}</td><td><b>${s.name}</b></td><td>${r?r.timeIn:'--'}</td><td>${r?r.timeOut:'--'}</td><td><button onclick="resetAtt('${s.id}')" style="background:var(--ios-red); padding:5px;">Reset</button></td></tr>`;
        }).join("");

    document.getElementById("studentTableBody").innerHTML = `<table><tr><th>ID</th><th>Name</th><th>Class</th><th>Action</th></tr>` + students.map(s => 
        `<tr><td>${s.id}</td><td><b>${s.name}</b></td><td>${s.course} ${s.year}-${s.section}</td><td><button onclick="delStud('${s.id}')" style="background:var(--ios-red); padding:5px;">Del</button></td></tr>`).join("") + `</table>`;

    const rD = document.getElementById('attDate').value;
    const rF = document.getElementById("repSectionFilter").value;
    document.getElementById("attendanceReportBody").innerHTML = `<table><tr><th>ID</th><th>Name</th><th>In</th><th>Out</th><th>Status</th></tr>` + students
        .filter(s => rF === "ALL" || s.section === rF)
        .map(s => {
            const r = attendance.find(a => a.id === s.id && a.date === rD);
            return `<tr><td>${s.id}</td><td>${s.name}</td><td>${r?r.timeIn:'--'}</td><td>${r?r.timeOut:'--'}</td><td>${r?'Present':'Absent'}</td></tr>`;
        }).join("") + `</table>`;
}

function saveStudent() {
    let s = { id: document.getElementById("sid").value, name: document.getElementById("sname").value, course: document.getElementById("courseSelect").value, year: document.getElementById("yearSelect").value, section: document.getElementById("sectionSelect").value };
    if(!s.id || !s.name) return;
    students.push(s); save(); renderAll();
    document.getElementById("sid").value=""; document.getElementById("sname").value="";
}

function showTab(id) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active-tab')); document.getElementById(id).classList.add('active-tab'); stopScanner(); renderAll(); }
function delStud(id) { if(confirm("Delete?")) { students = students.filter(s => s.id !== id); save(); renderAll(); } }
function resetAtt(id) { if(confirm("Reset logs?")) { attendance = attendance.filter(a => !(a.id === id && a.date === todayStr)); save(); renderAll(); } }
function backupData() { const b = new Blob([JSON.stringify({lu_ios26_st:students, lu_ios26_at:attendance, lu_ios26_dr:dropdowns})], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = "Backup.json"; a.click(); }
function factoryReset() { if(confirm("Wipe all?")) { localStorage.clear(); location.reload(); } }

window.onload = async () => {
    try {
        const devices = await Html5Qrcode.getCameras();
        document.getElementById('cameraSource').innerHTML = devices.map(d => `<option value="${d.id}">${d.label}</option>`).join('');
    } catch (e) {}
    refreshDropdowns();
};
</script>
</body>
</html>
