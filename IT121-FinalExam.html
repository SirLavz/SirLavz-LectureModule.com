 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SirLavz Exam Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; -webkit-user-select: none; }
        
        /* Fixed: Adjusted padding and width for mobile responsiveness */
        .main-container { display: flex; flex-direction: column; gap: 20px; padding: 10px; max-width: 1450px; margin: auto; }

        @media (min-width: 992px) {
            .main-container { flex-direction: row; padding: 25px; }
            .quiz-card { flex: 1; }
            .proctor-panel { width: 360px; position: sticky; top: 20px; height: fit-content; }
        }

        .quiz-card { border-radius: 15px; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.1); min-height: 400px; background: white; padding: 20px; width: 100%; }
        .header-accent { border-top: 5px solid #004a99; border-radius: 15px 15px 0 0; }
        
        .option-btn { text-align: left; margin-bottom: 10px; border: 2px solid #edf2f7; transition: 0.2s; padding: 15px; width: 100%; background: white; border-radius: 12px; font-size: 1rem; display: flex; align-items: center; }
        .option-btn:hover { border-color: #004a99; background-color: #f0f7ff; }
        .selected-opt { background-color: #e6f0ff !important; border-color: #004a99 !important; color: #004a99 !important; font-weight: 600; }

        /* Fixed: Floating Proctor Panel for Mobile */
        @media (max-width: 991px) {
            .proctor-panel { 
                position: fixed; 
                bottom: 10px; 
                right: 10px; 
                width: 150px; 
                z-index: 1000; 
                padding: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            }
            .log-box, .proctor-header-text { display: none; } /* Hide logs on small mobile screens */
        }

        .proctor-panel { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 10px; transform: scaleX(-1); background: #2d3748; }
        
        .log-box { height: 150px; overflow-y: auto; background: #f8fafc; border-radius: 10px; padding: 10px; font-size: 0.75rem; margin-top: 15px; border: 1px solid #e2e8f0; }

        #violation-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); color: white; z-index: 10000;
            justify-content: center; align-items: center; flex-direction: column; text-align: center; padding: 20px;
        }

        #rec-indicator { color: #e53e3e; animation: blink 1.5s infinite; display: none; font-weight: bold; font-size: 0.8rem; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="violation-overlay">
    <i class="fas fa-lock fa-4x text-danger mb-3"></i>
    <h2 class="fw-bold">SECURITY ALERT</h2>
    <p class="lead">Tab switching is strictly prohibited.</p>
    <button class="btn btn-danger px-5 mt-3" onclick="closeViolation()">I AGREE & CONTINUE</button>
</div>

<div class="main-container">
    <div class="card quiz-card header-accent">
        <div id="setup-screen" class="text-center py-4">
            <img src="lulogo.png" width="60px" height="60px" alt="Logo" class="mb-3"> 
            <h2 class="fw-bold h3">NAAP</h2>
            <h5 class="text-muted mb-4">Institute of Computer Studies</h5>
            <div class="p-4 mx-auto border rounded shadow-sm" style="max-width: 450px; background: #fff;">
                <p class="small text-uppercase fw-bold text-primary mb-3">IT 121 - Networking 1</p>
                <input type="text" id="student-name" class="form-control mb-3" placeholder="Full Name" required>
                <input type="text" id="student-id" class="form-control mb-4" placeholder="Student ID" required>
                <button class="btn btn-primary btn-lg w-100 shadow" onclick="startSecureExam()">Enter Examination Room</button>
            </div>
        </div>

        <div id="exam-area" class="d-none">
            <div class="d-flex justify-content-between align-items-end mb-3">
                <div>
                    <h5 class="mb-0 text-primary fw-bold">IT 121 Final Exam</h5>
                </div>
                <div class="text-end">
                    <span id="progress-text" class="badge bg-dark px-3 py-2">Question 1/45</span>
                </div>
            </div>
            <div class="progress mb-4" style="height: 8px;"><div id="progress-bar" class="progress-bar bg-primary" style="width: 2%"></div></div>
            
            <div id="quiz-content">
                <h4 id="question-text" class="mb-4 fw-bold text-dark">...</h4>
                <div id="options-container" class="d-grid gap-1"></div>
            </div>

            <div class="d-flex justify-content-center gap-3 mt-5 pt-3 border-top">
                <button class="btn btn-outline-secondary px-4 invisible" id="prev-btn" onclick="prevQuestion()">Back</button>
                <button id="next-btn" class="btn btn-primary px-5 shadow" onclick="nextQuestion()">Next</button>
                <button id="submit-btn" class="btn btn-success px-5 d-none shadow" onclick="finishExam()">Submit</button>
            </div>
        </div>

        <div id="result-area" class="text-center d-none py-4">
            <h1 class="fw-bold h2">Complete</h1>
            <h2 class="display-6 text-primary mb-4">Score: <span id="final-score">0</span> / 45</h2>
            <button class="btn btn-dark btn-md px-5" onclick="generatePDF()">Download Report</button>
        </div>
    </div>

    <div class="proctor-panel">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span id="rec-indicator"><i class="fas fa-circle me-1"></i> REC</span>
            <span class="badge bg-primary proctor-header-text">PROCTOR</span>
        </div>
        <video id="webcam" autoplay muted playsinline></video>
        <div class="log-box" id="audit-logs"></div>
    </div>
</div>

<script>
// Data and Logic
const rawData = [
    { q: "Which protocol maps a domain name (www.google.com) to an IP address?", o: ["HTTP", "DNS", "FTP", "SMTP"], a: 1, r: "DNS acts as the phonebook.", s: 1 },
    { q: "Which layer in TCP/IP combines OSI layers 5, 6, and 7?", o: ["Transport", "Internet", "Application", "Network Access"], a: 2, r: "TCP/IP Application layer combines these.", s: 1 },
    { q: "Primary role of the Application Layer?", o: ["Physical connection", "Services to end-user", "Error correction", "Routing"], a: 1, r: "Provides network services to software.", s: 1 },
    { q: "Protocol for sending email from client to server?", o: ["POP3", "IMAP", "SMTP", "SNMP"], a: 2, r: "SMTP is for outgoing mail.", s: 1 },
    { q: "Which is NOT an Application layer function?", o: ["File transfer", "Email", "Data encryption", "Packet fragmentation"], a: 3, r: "Fragmentation happens at lower layers.", s: 1 },
    { q: "What is TFTP?", o: ["Secure FTP", "Simple UDP-based transfer", "Local cache protocol", "TCP-based tech protocol"], a: 1, r: "Trivial File Transfer Protocol uses UDP.", s: 1 },
    { q: "Which allows mailbox syncing across devices?", o: ["POP3", "SMTP", "IMAP", "HTTP"], a: 2, r: "IMAP syncs the mailbox on the server.", s: 1 },
    { q: "Standard Port for HTTP?", o: ["21", "25", "53", "80"], a: 3, r: "Port 80 is default.", s: 1 },
    { q: "Protocol for managing network devices?", o: ["TELNET", "SNMP", "DHCP", "FTP"], a: 1, r: "SNMP monitors devices.", s: 1 },
    { q: "What is the PDU at the Application Layer?", o: ["Segment", "Packet", "Frame", "Data/Message"], a: 3, r: "PDU is Data/Message.", s: 1 },
    { q: "Layer immediately below Application?", o: ["Session", "Presentation", "Transport", "Data Link"], a: 1, r: "Presentation is Layer 6.", s: 1 },
    { q: "Which is 'stateful'?", o: ["HTTP", "FTP", "DNS", "IP"], a: 1, r: "FTP maintains session state.", s: 1 },
    { q: "Standard for secure web browsing?", o: ["HTTP 1.1", "HTTP 2.0", "HTTPS", "SSL-Only"], a: 2, r: "HTTPS uses SSL/TLS.", s: 1 },
    { q: "Remote login protocol (unencrypted)?", o: ["SNMP", "TELNET", "SMTP", "POP3"], a: 1, r: "Telnet provides remote access.", s: 1 },
    { q: "Directory Services provide?", o: ["Local storage", "Global resource info", "Data compression", "Encryption"], a: 1, r: "Access to network objects database.", s: 1 },
    { q: "Primary Transport Layer responsibility?", o: ["Node-to-node", "Host-to-host", "Process-to-process", "Bit-to-bit"], a: 2, r: "Ensures data reaches specific application process.", s: 2 },
    { q: "Address used by Transport Layer?", o: ["IP Address", "MAC Address", "Port Address", "Logic Address"], a: 2, r: "Ports identify specific processes.", s: 2 },
    { q: "TCP Data Unit name?", o: ["Packet", "Frame", "Segment", "Datagram"], a: 2, r: "TCP uses Segments.", s: 2 },
    { q: "Function preventing receiver overwhelm?", o: ["Error Control", "Flow Control", "Segmentation", "Routing"], a: 1, r: "Flow control manages speed.", s: 2 },
    { q: "Connectionless L4 protocol?", o: ["TCP", "UDP", "IP", "HTTP"], a: 1, r: "UDP is connectionless.", s: 2 },
    { q: "Mechanism for TCP connection?", o: ["2-way handshake", "3-way handshake", "Windowing", "Checksum"], a: 1, r: "TCP uses 3-way handshake.", s: 2 },
    { q: "Transport Layer is called?", o: ["The Brain", "The Heart of OSI", "The Physical Link", "The User Face"], a: 1, r: "It bridges user/network layers.", s: 2 },
    { q: "Reliability in TCP means?", o: ["Encrypted data", "Retransmission of loss", "Fastest speed", "No headers"], a: 1, r: "TCP retransmits lost segments.", s: 2 },
    { q: "VOIP usually uses?", o: ["TCP", "UDP", "FTP", "SMTP"], a: 1, r: "UDP is better for real-time.", s: 2 },
    { q: "Port address size?", o: ["32 bits", "48 bits", "16 bits", "128 bits"], a: 2, r: "Ports are 16-bit.", s: 2 },
    { q: "Phases of connection-oriented service?", o: ["Route/Switch", "Establish/Transfer/Release", "Segment/Frame", "Encrypt/Compress"], a: 1, r: "TCP lifecycle.", s: 2 },
    { q: "Layer above Transport?", o: ["Network", "Session", "Presentation", "Application"], a: 1, r: "Session is Layer 5.", s: 2 },
    { q: "Multiplexing at L4 involves?", o: ["Sharing wires", "Multiple processes via ports", "Multiple paths", "Bit coding"], a: 1, r: "Allows many apps to share connection.", s: 2 },
    { q: "UDP Header characteristic?", o: ["Complex", "Heavyweight", "Low overhead", "Error-correcting"], a: 2, r: "UDP has low overhead.", s: 2 },
    { q: "Transport layer error control is?", o: ["Hop-by-hop", "End-to-end", "Not possible", "Only for headers"], a: 1, r: "Checks integrity source to destination.", s: 2 },
    { q: "Test end-to-end connectivity?", o: ["ipconfig", "ping", "netstat", "nslookup"], a: 1, r: "Ping checks reachability.", s: 3 },
    { q: "Ping works by IP but not domain name?", o: ["DHCP error", "DNS error", "HTTP error", "ARP error"], a: 1, r: "DNS failure.", s: 3 },
    { q: "List hops to destination?", o: ["tracert", "ipconfig /all", "ping -t", "nmap"], a: 0, r: "Traceroute maps path.", s: 3 },
    { q: "Firewall primary purpose?", o: ["Speed", "Traffic control/security", "DHCP", "Backups"], a: 1, r: "Filters traffic.", s: 3 },
    { q: "Secure tunnel protocol?", o: ["FTP", "HTTP", "VPN", "Telnet"], a: 2, r: "VPN provides encrypted tunnels.", s: 3 },
    { q: "Bottom-Up troubleshooting starts at?", o: ["Application", "Physical", "Network", "Reboot"], a: 1, r: "Check hardware/cables first.", s: 3 },
    { q: "IP Conflict symptom?", o: ["Fast fan", "Intermittent/No access", "Slow browser", "No email"], a: 1, r: "Two devices cannot share IP.", s: 3 },
    { q: "Malware that encrypts and demands money?", o: ["Spyware", "Ransomware", "Adware", "Worm"], a: 1, r: "Ransomware locks files.", s: 3 },
    { q: "Social engineering to steal info?", o: ["Phishing", "Traceroute", "DOS", "Switching"], a: 0, r: "Phishing uses bait.", s: 3 },
    { q: "First step in troubleshooting?", o: ["Theory", "Identify problem", "Implement", "Document"], a: 1, r: "Define what is broken.", s: 3 },
    { q: "IDS purpose?", o: ["Block countries", "Detect/Alert suspicious activity", "Speed", "Repair DB"], a: 1, r: "Monitors and alerts.", s: 3 },
    { q: "NIC light is off means?", o: ["Virus", "Physical Layer issue", "Wrong password", "DNS down"], a: 1, r: "No link light = hardware issue.", s: 3 },
    { q: "Strong password policy?", o: ["Birthdate", "Length + Complexity", "password123", "Shared"], a: 1, r: "Complexity prevents cracking.", s: 3 },
    { q: "DoS attack goal?", o: ["Theft", "Service unavailability", "Password guessing", "Hardware upgrade"], a: 1, r: "Floods resources.", s: 3 },
    { q: "Traceroute 'Time Exceeded' means?", o: ["Device off", "TTL reached zero", "Slow internet", "Maintenance"], a: 1, r: "TTL is 0.", s: 3 }
];

const quizData = rawData.sort(() => Math.random() - 0.5);
let currentIdx = 0, userAnswers = new Array(quizData.length).fill(null);
let violations = 0, isExamActive = false, mediaRecorder, recordedChunks = [], model;

function initSecurity() {
    document.addEventListener("visibilitychange", () => {
        if (document.hidden && isExamActive) triggerViolation("Window Hidden");
    });
}

function triggerViolation(reason) {
    violations++;
    document.getElementById('violation-overlay').style.display = 'flex';
}

function closeViolation() { document.getElementById('violation-overlay').style.display = 'none'; }

async function startSecureExam() {
    const name = document.getElementById('student-name').value;
    const sid = document.getElementById('student-id').value;
    if(!name || !sid) { alert("Please complete info."); return; }

    try {
        const camStream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById('webcam').srcObject = camStream;
        
        // Start Screen Recording
        const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        mediaRecorder = new MediaRecorder(screenStream);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.start();

        model = await blazeface.load();
        
        document.getElementById('setup-screen').classList.add('d-none');
        document.getElementById('exam-area').classList.remove('d-none');
        document.getElementById('rec-indicator').style.display = 'block';
        
        isExamActive = true;
        initSecurity();
        
        // Fixed: Explicitly trigger the first question load
        showQuestion(); 
        
        setInterval(monitorFace, 5000);
    } catch { alert("Camera and Screen Sharing required."); }
}

function showQuestion() {
    const q = quizData[currentIdx];
    document.getElementById('question-text').innerText = `${currentIdx + 1}. ${q.q}`;
    document.getElementById('progress-text').innerText = `Q ${currentIdx + 1}/45`;
    document.getElementById('progress-bar').style.width = `${((currentIdx + 1)/45)*100}%`;
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    q.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = `option-btn ${userAnswers[currentIdx] === i ? 'selected-opt' : ''}`;
        btn.innerHTML = `<span class="badge bg-light text-dark me-2">${String.fromCharCode(65+i)}</span> ${opt}`;
        btn.onclick = () => { userAnswers[currentIdx] = i; showQuestion(); };
        container.appendChild(btn);
    });

    document.getElementById('prev-btn').classList.toggle('invisible', currentIdx === 0);
    const isLast = currentIdx === quizData.length - 1;
    document.getElementById('next-btn').classList.toggle('d-none', isLast);
    document.getElementById('submit-btn').classList.toggle('d-none', !isLast);
}

function nextQuestion() { currentIdx++; showQuestion(); }
function prevQuestion() { currentIdx--; showQuestion(); }

function finishExam() {
    isExamActive = false;
    if (mediaRecorder) mediaRecorder.stop();
    let score = 0;
    userAnswers.forEach((ans, i) => { if(ans === quizData[i].a) score++; });
    document.getElementById('exam-area').classList.add('d-none');
    document.getElementById('result-area').classList.remove('d-none');
    document.getElementById('final-score').innerText = score;
}

function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text(`Student: ${document.getElementById('student-name').value}`, 10, 10);
    doc.text(`Score: ${document.getElementById('final-score').innerText}/45`, 10, 20);
    doc.save("Result.pdf");
}
</script>
</body>
</html>
